# Rsync sync definitions for rsync-util.
#
# Structure: <dtype> > <location> > items[]
# Paths may use ~ (expanded to $HOME at runtime).
# Filter rules: includes are prepended before excludes in rsync order.
# Use excludes: ["*"] as the catch-all when includes are present.

music:
  local:
    items:
      - label: "Presets - DMGAudio"
        src: "/Library/Application Support/DMGAudio"
        dst: "~/Music/MyPreferences/Presets/DMGAudio"

      - label: "Presets - Third-Party"
        src: "~/Library/Audio/Presets"
        dst: "~/Music/MyPreferences/Presets/Third-Party"

      - label: "Presets - Toontrack"
        src: "~/Documents/Toontrack"
        dst: "~/Music/MyPreferences/Presets/Toontrack"

      - label: "Presets - Xfer - Nerve"
        src: "~/Music/MySamples/NerveData"
        dst: "~/Music/MyPreferences/Presets/Xfer/Nerve"
        excludes:
          - "Wav/"
          - "System/"
          - "f_*/"
          - "*.wav"
          - "*.wave"
          - "*.flac"
          - "*.png"

      - label: "Presets - Xfer - Serum 2"
        src: "/Library/Audio/Presets/Xfer Records/Serum 2 Presets"
        dst: "~/Music/MyPreferences/Presets/Xfer/Serum 2"
        excludes:
          - "Multisamples/"
          - "Samples/"
          - "Tables/"
          - "Impulses/"
          - "Skins/"
          - "*.wav"
          - "*.wave"
          - "*.flac"
          - "*.png"

      - label: "UA - AppConfig - Prefs"
        src: "~/Library/Preferences"
        dst: "~/Music/MyPreferences/Luna/config/prefs"
        includes:
          - "com.uaudio.luna.plist"
          - "Universal Audio/"
          - "Universal Audio/LUNAPrefs.json"
        excludes:
          - "*"

      # workspace/ contains sessions/ (LUNA project data) excluded here — only
      # cloud_prefs.json, midi_devices.json, and preferences/ are config.
      - label: "UA - AppConfig - Workspace"
        src: "~/Library/Application Support/Universal Audio"
        dst: "~/Music/MyPreferences/Luna/config/workspace"
        includes:
          - "Plug-In Icons/"
          - "Plug-In Icons/**"
          - "workspace/"
          - "workspace/cloud_prefs.json"
          - "workspace/midi_devices.json"
          - "workspace/preferences/"
          - "workspace/preferences/**"
        excludes:
          - "*"

      - label: "UA - User"
        src: "~/Documents/Universal Audio"
        dst: "~/Music/MyPreferences/Luna/usr"

  external:
    items:
      - label: "External - MyMusic"
        src: "~/Music/MyMusic"
        dst: "/Volumes/Backup-External/MyMusic"

      - label: "External - MyPreferences"
        src: "~/Music/MyPreferences"
        dst: "/Volumes/Backup-External/MyPreferences"

      - label: "External - MySamples"
        src: "~/Music/MySamples"
        dst: "/Volumes/Backup-External/MySamples"

docs:
  external:
    items:
      - label: "Docs - MyDocs"
        src: "~/Documents/MyDocs"
        dst: "/Volumes/Backup-External/MyDocs"
